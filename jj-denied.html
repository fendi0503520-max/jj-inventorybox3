<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/><title>無存取權限</title>
<script src="shared_store.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet"/>
<style>
body{background:#f0f4f8;font-family:'Noto Sans TC',sans-serif;color:#f0f4ff;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;}
.box{text-align:center;padding:40px;background:#1a2235;border:1px solid rgba(224,58,47,0.3);border-radius:20px;max-width:420px;}
.icon{font-size:64px;margin-bottom:16px;}
h2{font-size:20px;font-weight:700;color:#e03a2f;margin-bottom:8px;}
p{font-size:14px;color:#6b7280;line-height:1.7;margin-bottom:24px;}
.role-badge{display:inline-block;padding:4px 14px;background:rgba(74,144,217,0.12);color:#4a90d9;border-radius:8px;font-size:13px;font-weight:700;margin-bottom:20px;}
.btn{padding:11px 28px;border-radius:10px;background:linear-gradient(135deg,#e03a2f,#a01e15);color:#fff;border:none;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;}
</style>
</head>
<body>
<div class="box">
  <div class="icon">🚫</div>
  <h2>無存取權限</h2>
  <p>您目前的角色無法存取此頁面，請聯繫系統管理員調整權限。</p>
  <div class="role-badge" id="roleBox">載入中...</div>
  <br/><br/>
  <button class="btn" onclick="history.back()">← 返回上一頁</button>
  &nbsp;
  <button class="btn" style="background:#1a2235;border:1px solid rgba(0,0,0,0.07)" onclick="location.href='jj-dashboard.html'">🏠 回首頁</button>
</div>
<script>
const u = JJ.getUser();
document.getElementById('roleBox').textContent = u ? `您的角色：${u.role}` : '未登入';
</script>
</body>
</html>
