<!DOCTYPE html>
<html lang="zh-TW">
<head>
<script src="shared_store.js"></script>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JJ 簡易庫存管理系統 — 登入</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f0f4f8;
      --panel: #ffffff;
      --border: rgba(0,0,0,0.06);
      --accent: #e03a2f;
      --accent-glow: rgba(224,58,47,0.18);
      --blue: #4a90d9;
      --text: #1a2535;
      --muted: #64748b;
      --error: #f87171;
    }
    body {
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      background: var(--bg);
      font-family: 'Noto Sans TC', sans-serif;
      overflow: hidden;
    }
    .blob {
      position: fixed; border-radius: 50%;
      filter: blur(120px); opacity: 0.12; pointer-events: none;
      animation: drift 14s ease-in-out infinite alternate;
    }
    .blob-1 { width: 550px; height: 550px; background: #e03a2f; top: -150px; left: -180px; }
    .blob-2 { width: 400px; height: 400px; background: #4a90d9; bottom: -100px; right: -120px; animation-delay: -6s; }
    .blob-3 { width: 280px; height: 280px; background: #4caf7d; top: 55%; left: 58%; animation-delay: -10s; }
    @keyframes drift {
      0%   { transform: translate(0,0) scale(1); }
      100% { transform: translate(25px,18px) scale(1.06); }
    }
    .card {
      position: relative; z-index: 10;
      width: 100%; max-width: 440px; margin: 1rem;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 44px 40px 38px;
      box-shadow: 0 32px 80px rgba(0,0,0,0.65);
      animation: fadeUp 0.55s cubic-bezier(.22,1,.36,1) both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .card::before {
      content: '';
      position: absolute; top: 0; left: 20px; right: 20px;
      height: 2px; border-radius: 0 0 4px 4px;
      background: linear-gradient(90deg, var(--accent), var(--blue));
    }
    .logo-wrap {
      display: flex; align-items: center; gap: 14px;
      margin-bottom: 20px;
    }
    .brand-text { line-height: 1.3; }
    .brand-main { font-size: 18px; font-weight: 700; color: var(--text); letter-spacing: 0.05em; }
    .brand-sub  { font-size: 11px; color: var(--muted); letter-spacing: 0.06em; margin-top: 2px; }
    .logo-divider {
      height: 1px;
      background: linear-gradient(90deg, var(--accent) 0%, var(--blue) 50%, transparent 100%);
      opacity: 0.3; margin-bottom: 28px;
    }
    h1 { font-size: 24px; font-weight: 700; color: var(--text); margin-bottom: 5px; }
    .subtitle { font-size: 13px; color: var(--muted); margin-bottom: 28px; }
    .field { margin-bottom: 18px; }
    label {
      display: block; font-size: 12px; font-weight: 500;
      color: #9ca3af; margin-bottom: 7px;
      letter-spacing: 0.05em; text-transform: uppercase;
    }
    .input-wrap { position: relative; }
    .input-icon {
      position: absolute; left: 13px; top: 50%;
      transform: translateY(-50%); color: var(--muted);
      font-size: 15px; pointer-events: none;
    }
    input[type="email"], input[type="password"], input[type="text"] {
      width: 100%; padding: 12px 13px 12px 40px;
      background: rgba(0,0,0,0.03);
      border: 1px solid var(--border); border-radius: 10px;
      color: var(--text); font-size: 15px; font-family: inherit;
      outline: none; transition: border-color .2s, box-shadow .2s, background .2s;
    }
    input::placeholder { color: #2d3748; }
    input:focus {
      border-color: var(--accent);
      background: rgba(224,58,47,0.05);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }
    input.error-field { border-color: var(--error); box-shadow: 0 0 0 3px rgba(248,113,113,0.12); }
    .toggle-pw {
      position: absolute; right: 13px; top: 50%;
      transform: translateY(-50%);
      background: none; border: none; color: var(--muted);
      cursor: pointer; font-size: 15px; padding: 2px; transition: color .2s;
    }
    .toggle-pw:hover { color: var(--text); }
    .row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 26px; }
    .remember { display: flex; align-items: center; gap: 7px; font-size: 13px; color: var(--muted); cursor: pointer; }
    .remember input[type="checkbox"] { width: 15px; height: 15px; padding: 0; accent-color: var(--accent); cursor: pointer; }
    .forgot { font-size: 13px; color: var(--blue); text-decoration: none; transition: opacity .2s; }
    .forgot:hover { opacity: 0.7; }
    .btn {
      width: 100%; padding: 13px; border: none; border-radius: 10px;
      background: linear-gradient(135deg, var(--accent) 0%, #c0392b 100%);
      color: #fff; font-size: 15px; font-weight: 700; font-family: inherit;
      cursor: pointer; letter-spacing: 0.06em;
      transition: transform .15s, box-shadow .15s, opacity .15s;
      position: relative; overflow: hidden;
    }
    .btn::after { content: ''; position: absolute; inset: 0; background: linear-gradient(rgba(0,0,0,0.07),transparent); pointer-events: none; }
    .btn:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(224,58,47,0.35); }
    .btn:active { transform: none; box-shadow: none; }
    .btn:disabled { opacity: 0.55; cursor: not-allowed; transform: none; }
    .error-msg { font-size: 12px; color: var(--error); margin-top: 5px; display: none; }
    .divider { display: flex; align-items: center; gap: 10px; margin: 22px 0; }
    .divider span { flex: 1; height: 1px; background: var(--border); }
    .divider p { font-size: 12px; color: var(--muted); white-space: nowrap; }
    .socials { display: flex; gap: 10px; }
    .social-btn {
      flex: 1; padding: 10px; border: 1px solid var(--border); border-radius: 10px;
      background: rgba(0,0,0,0.025); color: var(--muted);
      font-size: 13px; font-family: inherit; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 7px;
      transition: border-color .2s, color .2s, background .2s;
    }
    .social-btn:hover { border-color: rgba(0,0,0,0.12); color: var(--text); background: rgba(0,0,0,0.05); }
    .register { text-align: center; margin-top: 20px; font-size: 13px; color: var(--muted); }
    .register a { color: var(--blue); text-decoration: none; font-weight: 500; }
    .register a:hover { opacity: 0.75; }
    .fm-badge {
      display: flex; align-items: center; justify-content: center; gap: 7px;
      margin-top: 24px; padding-top: 18px;
      border-top: 1px solid var(--border);
      font-size: 11px; color: #4b5563; letter-spacing: 0.04em;
    }
    .fm-squares { display: flex; gap: 2px; }
    .fm-squares span { display: block; width: 9px; height: 9px; border-radius: 2px; }
    .success-overlay {
      display: none; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center; padding: 20px 0;
    }
    .check-circle {
      width: 64px; height: 64px; border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), #c0392b);
      display: flex; align-items: center; justify-content: center;
      font-size: 28px; color: #fff; margin-bottom: 20px;
      animation: pop .4s cubic-bezier(.22,1,.36,1);
    }
    @keyframes pop { from { transform: scale(0.4); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .success-overlay h2 { color: var(--text); font-size: 22px; margin-bottom: 8px; }
    .success-overlay p  { color: var(--muted); font-size: 14px; }
  </style>
</head>
<body>

  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>

  <div class="card">

    <div class="logo-wrap">
      <!-- JJ Logo: two bold J letters in a rounded square -->
      <svg width="52" height="52" viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="52" height="52" rx="13" fill="url(#jjGrad)"/>
        <defs>
          <linearGradient id="jjGrad" x1="0" y1="0" x2="52" y2="52" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#e03a2f"/>
            <stop offset="100%" stop-color="#a01e15"/>
          </linearGradient>
        </defs>
        <!-- Left J -->
        <text x="7" y="38" font-family="Georgia, serif" font-size="30" font-weight="bold" fill="white">J</text>
        <!-- Right J -->
        <text x="25" y="38" font-family="Georgia, serif" font-size="30" font-weight="bold" fill="rgba(255,255,255,0.75)">J</text>
        <!-- Small inventory bar icon at bottom -->
        <rect x="8"  y="43" width="10" height="3" rx="1.5" fill="rgba(255,255,255,0.5)"/>
        <rect x="21" y="43" width="7"  height="3" rx="1.5" fill="rgba(255,255,255,0.4)"/>
        <rect x="31" y="43" width="13" height="3" rx="1.5" fill="rgba(255,255,255,0.3)"/>
      </svg>

      <div class="brand-text">
        <div class="brand-main">JJ 庫存管理系統</div>
        <div class="brand-sub">簡易庫存管理平台</div>
      </div>
    </div>

    <div class="logo-divider"></div>

    <div id="formSection">
      <h1>系統登入</h1>
      <p class="subtitle">請輸入您的帳號資料以進入庫存管理系統</p>

      <div class="field">
        <label>電子郵件</label>
        <div class="input-wrap">
          <span class="input-icon">✉</span>
          <input type="email" id="email" placeholder="請輸入帳號 Email" autocomplete="email" />
        </div>
        <div class="error-msg" id="emailErr">請輸入有效的電子郵件地址</div>
      </div>

      <div class="field">
        <label>密碼</label>
        <div class="input-wrap">
          <span class="input-icon">🔒</span>
          <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
          <button type="button" class="toggle-pw" id="togglePw" aria-label="顯示或隱藏密碼">👁</button>
        </div>
        <div class="error-msg" id="pwErr">密碼不能為空</div>
      </div>

      <div class="row">
        <label class="remember">
          <input type="checkbox" id="remember" /> 記住我
        </label>
        <a href="#" class="forgot">忘記密碼？</a>
      </div>

      <button class="btn" id="loginBtn" >登 入</button>

      <div class="divider">
        <span></span><p>或使用其他方式登入</p><span></span>
      </div>

      <div class="socials">
        <button class="social-btn" onclick="socialLogin('Google')">
          <svg width="15" height="15" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
          Google 登入
        </button>
        <button class="social-btn" onclick="socialLogin('Microsoft')">
          <svg width="15" height="15" viewBox="0 0 23 23"><rect x="1" y="1" width="10" height="10" fill="#f25022"/><rect x="12" y="1" width="10" height="10" fill="#7fba00"/><rect x="1" y="12" width="10" height="10" fill="#00a4ef"/><rect x="12" y="12" width="10" height="10" fill="#ffb900"/></svg>
          Microsoft
        </button>
      </div>

      <p class="register">尚未擁有帳號？ <a href="#">申請帳號</a></p>

      <div class="fm-badge">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#4b5563" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/><path d="M6 8h4M6 11h8"/></svg>
        JJ 簡易庫存管理系統 &nbsp;v1.0
      </div>
    </div>

    <div class="success-overlay" id="successSection">
      <div class="check-circle">✓</div>
      <h2>登入成功！</h2>
      <p>歡迎回來，正在跳轉至主頁…</p>
    </div>

  </div>

  <script>
// 密碼顯示切換
window.addEventListener('load', function() {
  var pwInput = document.getElementById('password');
  var toggle  = document.getElementById('togglePw');
  if (toggle && pwInput) {
    toggle.addEventListener('click', function() {
      pwInput.type = pwInput.type === 'password' ? 'text' : 'password';
    });
  }
});
</script>

<style>
@keyframes shake {
  0%,100%{transform:translateX(0)}
  20%{transform:translateX(-8px)}
  40%{transform:translateX(8px)}
  60%{transform:translateX(-5px)}
  80%{transform:translateX(5px)}
}
</style>


<style>
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}
</style>


<script>
// ── JJ 登入系統 ──
// 若已登入且 session 有效，直接進儀表板
window.onload = function() {
  if (typeof JJ !== 'undefined' && JJ.getUser() && JJ.isSessionAlive()) {
    location.href = 'jj-dashboard.html';
    return;
  }
  setupLogin();
};

function setupLogin() {
  var emailEl  = document.getElementById('email');
  var pwdEl    = document.getElementById('password');
  var loginBtn = document.getElementById('loginBtn');
  var errBox   = document.getElementById('loginErr');

  if (!errBox) {
    errBox = document.createElement('div');
    errBox.id = 'loginErr';
    errBox.style.cssText = 'color:#c0392b;font-size:13px;margin-top:10px;padding:10px 14px;' +
      'background:rgba(192,57,43,0.07);border:1px solid rgba(192,57,43,0.2);' +
      'border-radius:8px;display:none;text-align:center;line-height:1.7';
    if (loginBtn && loginBtn.parentNode) {
      loginBtn.parentNode.insertBefore(errBox, loginBtn.nextSibling);
    }
  }

  function showErr(msg) {
    errBox.innerHTML = msg;
    errBox.style.display = 'block';
    var card = document.querySelector('.login-card') || document.querySelector('.card');
    if (card) {
      card.style.animation = 'none';
      card.offsetHeight;
      card.style.animation = 'shake .4s ease';
    }
  }

  function doLogin() {
    errBox.style.display = 'none';
    var email = emailEl ? emailEl.value.trim() : '';
    var pwd   = pwdEl   ? pwdEl.value : '';
    if (!email || !pwd) { showErr('⚠ 請輸入帳號與密碼'); return; }

    var result = JJ.login(email, pwd);
    if (!result.ok) {
      if (result.reason === 'locked') {
        showErr('🔒 帳號已鎖定，請 ' + result.minutes + ' 分鐘後再試');
      } else {
        showErr('⚠ 帳號或密碼錯誤，還有 ' + result.remaining + ' 次機會');
      }
      return;
    }
    // 登入成功
    var card = document.querySelector('.login-card') || document.querySelector('.card');
    if (card) { card.style.transition = 'opacity .3s'; card.style.opacity = '0'; }
    setTimeout(function() {
      location.href = result.mustChange ? 'jj-profile.html' : 'jj-dashboard.html';
    }, 350);
  }

  if (loginBtn) loginBtn.addEventListener('click', doLogin);
  if (pwdEl)    pwdEl.addEventListener('keydown', function(e) { if (e.key === 'Enter') doLogin(); });
  if (emailEl)  emailEl.addEventListener('keydown', function(e) { if (e.key === 'Enter') pwdEl && pwdEl.focus(); });
}

function socialLogin(p) { alert('使用 ' + p + ' 登入（示範用）'); }
</script>
<style>
@keyframes shake {
  0%,100%{transform:translateX(0)}
  20%{transform:translateX(-8px)}40%{transform:translateX(8px)}
  60%{transform:translateX(-5px)}80%{transform:translateX(5px)}
}
</style>

</body>
</html>
